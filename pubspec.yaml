name: weather_app
description: "A polished weather app with clean architecture and BLoC/Cubit."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Local storage
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.19.0
  get_it: ^7.7.0
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  retrofit_generator: ^8.1.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
